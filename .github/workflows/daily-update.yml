name: Daily Basecamp Status Update

on:
  schedule:
    # 3:00 AM US Eastern (UTC-5 winter / UTC-4 summer)
    # Adjust cron if you're in a different timezone:
    #   Central:  0 9 * * *
    #   Mountain: 0 10 * * *
    #   Pacific:  0 11 * * *
    - cron: '0 8 * * *'
  workflow_dispatch:   # Also allow manual "Run workflow" from GitHub Actions UI

permissions:
  contents: write      # Needed to commit dashboard.html + snapshot.json back to repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard updater
        env:
          BASECAMP_ACCESS_TOKEN: ${{ secrets.BASECAMP_ACCESS_TOKEN }}
          BASECAMP_REFRESH_TOKEN: ${{ secrets.BASECAMP_REFRESH_TOKEN }}
        run: python update_dashboard.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html snapshot.json
          git diff --staged --quiet \
            || git commit -m "chore: auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
